<!doctype html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Cerere eliberare anchetă socială</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Geologica, Arial, sans-serif;
        background: #fff;
        color: #3f498b;
        font-size: 12px;
        line-height: 1.4;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .container {
        width: 100%;
        margin: 0 auto;
      }
      .document-page {
        width: 100%;
        min-height: 100%;
        background: #fff;
        display: flex;
        flex-direction: column;
        padding: 0 5px;
      }
      .doc-header {
        display: flex;
        align-items: center;
        border-bottom: 1px solid rgba(15, 14, 37, 0.1);
        padding-bottom: 10px;
        flex-shrink: 0;
      }
      .emblem {
        width: 40px;
        height: 40px;
        padding: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .emblem svg {
        width: 24px;
        height: 24px;
      }
      .form-id {
        padding: 4px;
        border-left: 1px solid rgba(15, 14, 37, 0.1);
      }
      .form-id p {
        font-size: 10px;
        line-height: 14px;
        letter-spacing: 0.5px;
        color: #bfc0d3;
        font-weight: 500;
      }
      .doc-content {
        padding: 8px 0;
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      .doc-title {
        text-align: center;
        padding: 6px 0;
        margin-bottom: 10px;
      }
      .doc-title h1 {
        font-size: 24px;
        font-weight: 600;
        line-height: 28px;
        color: #3f498b;
        margin: 0;
      }
      .form-row {
        display: flex;
        align-items: flex-start;
        margin-bottom: 6px;
      }
      .form-row > * {
        margin-right: 6px;
      }
      .form-row > :last-child {
        margin-right: 0;
      }
      .field-line {
        display: flex;
        align-items: center;
        margin-bottom: 6px;
      }
      .field-label {
        font-size: 16px;
        font-weight: 300;
        line-height: 18px;
        color: #3f498b;
        white-space: nowrap;
        margin-right: 4px;
      }
      .field-input {
        display: flex;
        align-items: center;
        padding: 2px 6px 2px 5px;
        background: #eff0f4;
        border-radius: 6px;
        min-height: 22px;
        flex: 1;
        min-width: 0;
      }
      .field-input .value {
        font-family: "Courier New", monospace;
        font-size: 14px;
        font-weight: 500;
        line-height: 14px;
        letter-spacing: 0.4px;
        color: #5e6191;
        flex: 1;
        min-width: 0;
      }
      .doc-footer {
        display: flex;
        flex-direction: column;
        padding: 6px 4px 4px 4px;
        background: #fff;
        border-top: 1px solid rgba(15, 14, 37, 0.1);
        margin-top: auto;
        flex-shrink: 0;
      }
      .footer-notes {
        flex: 1;
        font-size: 7px;
        font-weight: 300;
        line-height: 9px;
        color: #5e6191;
      }
      .mt4 {
        margin-top: 3px;
      }
      .mt8 {
        margin-top: 6px;
      }
      .mt12 {
        margin-top: 10px;
      }
      .mb0 {
        margin-bottom: 0;
      }
      .flex1 {
        flex: 1;
      }
      .w80 {
        min-width: 74px;
        flex: none;
      }
      .w100 {
        min-width: 94px;
        flex: none;
      }
      .w120 {
        min-width: 114px;
        flex: none;
      }
      .w150 {
        min-width: 140px;
        flex: none;
      }
      .w180 {
        min-width: 170px;
        flex: none;
      }
      .doc-subheader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 0;
        margin-bottom: 6px;
        flex-shrink: 0;
      }
      .reg-info {
        display: flex;
        align-items: flex-start;
      }
      .qr-img {
        width: 80px;
        align-items: center;
        justify-content: center;
        object-fit: contain;
      }
      .reg-details {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        max-height: 70px;
      }
      .chips-container {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px 3px 6px;
        background: #eff0f4;
        border-radius: 8px;
        font-size: 10px;
        font-weight: 500;
        line-height: 14px;
        letter-spacing: 0.5px;
        gap: 5px;
      }
      .chip > p > .series {
        text-transform: uppercase;
      }
      .chip.output {
        background: #f69785;
        color: #fff;
      }
      .chip.input {
        background: #5e6191;
        color: #fff;
      }
      .chip.input > img {
        rotate: 180deg;
      }
      .chip.dept {
        text-transform: uppercase;
      }
      .chip-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        margin-right: 4px;
      }
      .reg-date {
        font-size: 10px;
        font-weight: 500;
        line-height: 14px;
      }
      .avoid-break {
        page-break-inside: avoid;
      }
      .page-break-before {
        break-before: page;
        page-break-before: always;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <article class="document-page">
        <header
          class="doc-header"
          th:if="${beneficiaryName != null and beneficiaryName != ''}"
        >
          <div
            class=""
            th:if="${beneficiaryLogo != null and beneficiaryLogo != ''}"
          >
            <img
              th:src="${beneficiaryLogo}"
              alt="Logo"
              style="max-height: 32px; max-width: 100px; object-fit: contain"
            />
          </div>
          <div
            class="emblem"
            th:if="${beneficiaryLogo == null or beneficiaryLogo == ''}"
            style="
              width: 40px;
              height: 40px;
              border-radius: 5px;
              background: #3f498b;
              display: flex;
              align-items: center;
              justify-content: center;
            "
          >
            <span
              style="color: #fff; font-size: 30px; font-weight: 700"
              th:text="${#strings.toUpperCase(#strings.substring(beneficiaryName, 0, 1))}"
            ></span>
          </div>
          <div style="flex: 1"></div>
          <div style="text-align: right">
            <p
              style="
                font-size: 10px;
                font-weight: 700;
                color: #3f498b;
                text-transform: capitalize;
                line-height: 15px;
              "
              th:text="${beneficiaryName}"
            ></p>
            <p
              th:if="${beneficiaryAddress != null and beneficiaryAddress != ''}"
              style="
                font-size: 9px;
                font-weight: 400;
                color: #888;
                line-height: 15px;
              "
              th:text="${beneficiaryAddress}"
            ></p>
            <p
              th:if="${beneficiaryFiscalId != null and beneficiaryFiscalId != ''}"
              style="
                font-size: 9px;
                font-weight: 400;
                color: #888;
                line-height: 15px;
              "
              th:text="'Cod de înregistrare fiscală: ' + ${beneficiaryFiscalId}"
            ></p>
          </div>
        </header>
        <div
          class="doc-subheader"
          th:if="${(inputRegistrationNumber != null and inputRegistrationNumber != '') or (outputRegistrationNumber != null and outputRegistrationNumber != '') or (registeredByDepartment != null and registeredByDepartment != '')}"
        >

            <img
              th:if="${inputQrImage != null and inputQrImage != '' and inputQrImage != 'placeholder'}"
              th:src="'data:image/png;base64,' + ${inputQrImage}"
              class="qr-img"
              alt="QR"
            />

              th:if="${(inputQrImage == null or inputQrImage == '' or inputQrImage == 'placeholder') and outputQrImage != null and outputQrImage != '' and outputQrImage != 'placeholder'}"

              class="qr-img"
              alt="QR"
            />

                  <img

                <p

                  th:text="${inputRegistrationDate} ?: ''"
                ></p>

                th:if="${outputRegistrationNumber != null and outputRegistrationNumber != ''}"
              >

                    <span
                      class="series"
                      th:text="${outputRegistrationSeries} ?: ''"

                  class="reg-date"
                  th:text="${outputRegistrationDate} ?: ''"

          </div>
          <span
            class="chip dept"
            th:if="${registeredByDepartment != null and registeredByDepartment != ''}"
            th:text="${registeredByDepartment}"
          ></span>
        </div>

        <div class="doc-content">
          <!-- TITLE: DOMNULE PRIMAR -->
          <div class="doc-title">
            <h1>DOMNULE PRIMAR</h1>
          </div>

          <!-- Row 1: Subsemnatul(a) ... domiciliat -->
          <div class="form-row">
            <div class="field-line flex1 mb0">
              <span class="field-label">Subsemnatul(a)</span>
              <div class="field-input">
                <span class="value" th:text="${subsemnatul} ?: ''"></span>
              </div>
              <span class="field-label"> domiciliat</span>
            </div>
          </div>

          <!-- Row 2: în satul ... comuna ... județul ... -->
          <div class="form-row">
            <div class="field-line flex1 mb0">
              <span class="field-label">în localitatea</span>
              <div class="field-input">
                <span class="value" th:text="${localitatea} ?: ''"></span>
              </div>
              <span class="field-label"> comuna</span>
              <div class="field-input">
                <span class="value" th:text="${comuna} ?: ''"></span>
              </div>
              <span class="field-label"> județul</span>
              <div class="field-input">
                <span class="value" th:text="${judetul} ?: ''"></span>
              </div>
            </div>
          </div>

          <!-- Row 3: vă rog să-mi aprobați ... necesară la -->
          <div class="form-row">
            <div class="field-line flex1 mb0">
              <span class="field-label"
                >vă rog să-mi aprobați efectuarea unei anchete sociale fiindu-mi
                necesară la</span
              >
            </div>
          </div>

          <!-- Row 4: motiv ancheta (full width) -->
          <div class="form-row">
            <div class="field-line flex1 mb0">
              <div
                class="field-input"
                style="min-height: 60px; align-items: flex-start"
              >
                <span class="value" th:text="${motiv_ancheta} ?: ''"></span>
              </div>
            </div>
          </div>

          <!-- Spacer to push Data/Semnatura down -->
          <div style="flex: 1"></div>

          <!-- Data + Semnătura row -->
          <div
            class="form-row"
            style="justify-content: space-between; margin-top: 40px"
          >
            <div class="field-line mb0">
              <span class="field-label" style="font-weight: 600">Data</span>
              <div class="field-input w150">
             <span class="value" th:text="${data != null ? #strings.replace(#strings.replace(#strings.replace(data,'[',''),']',''),' ','') : ''}"></span>

              </div>
            </div>
            <div class="field-line mb0">
              <span class="field-label" style="font-weight: 600"
                >Semnătura</span
              >
              <div class="field-input w150">
                <span class="value"></span>
              </div>
            </div>
          </div>
        </div>

        <!-- FOOTER (last page, no page number) -->
        <footer class="doc-footer avoid-break">
          <div class="footer-notes">
            <p>Cerere eliberare anchetă socială</p>
          </div>
        </footer>
      </article>
    </main>
